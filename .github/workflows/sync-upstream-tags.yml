name: Sync Tags Only

on:
  # schedule:
  #   - cron: '0 * * * *' # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com" > ~/.git-credentials

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/jito-foundation/jito-solana.git
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/team-supersafe/forked-jito-solana.git

      - name: Sync new tags with proper verification
        run: |
          set -e  # Exit on any error
          
          for tag in $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | sort -u); do
            echo "Checking tag: $tag"
            
            # Check if tag exists locally
            if git tag -l | grep -q "^$tag$"; then
              echo "Tag $tag already exists locally, skipping"
              continue
            fi
            
            # Check if tag exists remotely
            if git ls-remote --tags origin | grep -q "refs/tags/$tag$"; then
              echo "Tag $tag already exists remotely, skipping"
              continue
            fi
            
            echo "Processing tag: $tag"
            
            # Extract version from tag
            version=$(echo "$tag" | sed 's/^v\([0-9]\+\.[0-9]\+\.[0-9]\+\)-jito/\1/')
            
            # Get the commit hash for this tag from upstream without creating a local tag
            commit_hash=$(git ls-remote upstream "refs/tags/$tag" | cut -f1)
            
            if [ -z "$commit_hash" ]; then
              echo "Could not find commit hash for tag $tag, skipping"
              continue
            fi
            
            # Check what version is actually in the upstream commit
            upstream_version=$(git show "$commit_hash:Cargo.toml" | grep '^version =' | sed 's/version = "\([^"]*\)"/\1/')
            
            echo "Tag: $tag, Expected version: $version, Upstream version: $upstream_version"
            
            # Check if this commit is from master branch
            is_master_commit=$(git show --format="%B" "$commit_hash" | head -1 | grep -c "master\|main" || echo "0")
            
            # Ensure is_master_commit is a valid integer
            if [ -z "$is_master_commit" ] || ! [[ "$is_master_commit" =~ ^[0-9]+$ ]]; then
              is_master_commit=0
            fi
            
            echo "Debug: is_master_commit = '$is_master_commit'"
            
            if [ "$upstream_version" != "$version" ] || [ "$is_master_commit" -gt 0 ]; then
              echo "Warning: Upstream tag $tag appears to be from master branch or has wrong version"
              echo "Skipping this tag as it may not be a proper release"
              continue
            else
              # Upstream version looks correct, sync the tag
              echo "Creating tag: $tag"
              git tag -a "$tag" -m "Release $tag" "$commit_hash"
              echo "Pushing tag: $tag"
              git push origin "$tag"
              echo "Successfully synced tag: $tag"
            fi
          done
