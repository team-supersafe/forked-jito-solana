name: Sync Tags Only

on:
  # schedule:
  #   - cron: '0 * * * *' # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/jito-foundation/jito-solana.git
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/team-supersafe/forked-jito-solana.git

      - name: Sync new tags with proper verification
        run: |
          set -e  # Exit on any error
          
          for tag in $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | sort -u); do
            echo "Checking tag: $tag"
            
            # Check if tag exists locally
            if git tag -l | grep -q "^$tag$"; then
              echo "Tag $tag already exists locally, skipping"
              continue
            fi
            
            # Check if tag exists remotely
            if git ls-remote --tags origin | grep -q "refs/tags/$tag$"; then
              echo "Tag $tag already exists remotely, skipping"
              continue
            fi
            
            echo "Processing tag: $tag"
            
            # Get the commit hash for this tag from upstream
            commit_hash=$(git ls-remote upstream "refs/tags/$tag" | cut -f1)
            
            if [ -z "$commit_hash" ]; then
              echo "Could not find commit hash for tag $tag, skipping"
              continue
            fi
            
            # Fetch the specific commit from upstream
            git fetch upstream "$commit_hash"
            
            # Get the actual commit that the tag points to (not the tag itself)
            actual_commit=$(git rev-parse "$commit_hash^{commit}" 2>/dev/null || echo "$commit_hash")
            
            # Create the annotated tag
            echo "Creating tag: $tag"
            git tag -a "$tag" -m "Release $tag" "$actual_commit"
            echo "Pushing tag: $tag"
            if git push origin "$tag"; then
              echo "Successfully synced tag: $tag"
            else
              echo "Failed to push tag: $tag"
              git tag -d "$tag"
            fi
          done
