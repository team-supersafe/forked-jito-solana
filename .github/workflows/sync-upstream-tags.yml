name: Sync Tags Only

on:
  # schedule:
  #   - cron: '0 * * * *' # every hour
  workflow_dispatch:

# Grant the necessary permissions to the GITHUB_TOKEN
permissions:
  contents: write # Needed to push commits and tags
  workflows: write  # Crucial for pushing commits that contain workflow file changes

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Add upstream remote
        run: |
          # Use the GITHUB_TOKEN to authenticate with the origin repository
          git remote add upstream https://github.com/jito-foundation/jito-solana.git
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Sync new tags with proper verification
        run: |
          set -e  # Exit on any error
          
          for tag in $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | sort -u); do
            echo "Checking tag: $tag"
            
            if git tag -l | grep -q "^$tag$"; then
              echo "Tag $tag already exists locally, skipping"
              continue
            fi
            
            if git ls-remote --tags origin | grep -q "refs/tags/$tag$"; then
              echo "Tag $tag already exists remotely, skipping"
              continue
            fi
            
            echo "Processing tag: $tag"
            
            commit_hash=$(git ls-remote upstream "refs/tags/$tag" | cut -f1)
            
            if [ -z "$commit_hash" ]; then
              echo "Could not find commit hash for tag $tag, skipping"
              continue
            fi
            
            git fetch upstream "$commit_hash"
            
            actual_commit=$(git rev-parse "$commit_hash^{commit}" 2>/dev/null || echo "$commit_hash")
            
            echo "Creating tag: $tag"
            git tag -a "$tag" -m "Release $tag" "$actual_commit"
            echo "Pushing tag: $tag"
            if git push origin "$tag"; then
              echo "Successfully synced tag: $tag"
            else
              echo "Failed to push tag: $tag"
              git tag -d "$tag"
            fi
          done